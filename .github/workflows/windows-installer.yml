name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.1.0"
          }
          "AUTOSNAP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up conda env app
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: environment.yml
          activate-environment: app

      - name: Test
        shell: cmd /C CALL {0}
        run: |
          conda activate app
          python -m unittest discover -s tests

      - name: Build app with PyInstaller
        shell: cmd /C CALL {0}
        run: |
          conda activate app
          python scripts\create_icon.py
          rmdir /s /q build 2>nul
          rmdir /s /q dist 2>nul
          python -m PyInstaller --noconfirm --windowed --onedir --name AutoSnap --icon assets\autosnap.ico autosnap_launcher.py

      - name: Build installer
        shell: cmd /C CALL {0}
        run: |
          conda activate app
          rmdir /s /q installer-dist 2>nul
          mkdir installer-dist
          python -m PyInstaller --noconfirm --windowed --onefile --distpath installer-dist --workpath build\installer --name AutoSnap-Setup --icon assets\autosnap.ico --add-data "dist\AutoSnap;payload\AutoSnap" installer\bootstrap.py
          if not exist installer-dist\AutoSnap-Setup.exe exit /b 1
          dir installer-dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: AutoSnap-Windows-Installer
          path: installer-dist/AutoSnap-Setup.exe
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-dist/AutoSnap-Setup.exe
          generate_release_notes: true
