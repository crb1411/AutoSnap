name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.1.0"
          }
          "AUTOSNAP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up conda env app
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: environment.yml
          activate-environment: app

      - name: Test
        shell: cmd /C CALL {0}
        run: |
          conda activate app
          python -m unittest discover -s tests

      - name: Build app with PyInstaller
        shell: cmd /C CALL {0}
        run: |
          conda activate app
          python scripts\create_icon.py
          rmdir /s /q build 2>nul
          rmdir /s /q dist 2>nul
          python -m PyInstaller --noconfirm --windowed --onedir --name AutoSnap --icon assets\autosnap.ico autosnap_launcher.py

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer
        run: |
          New-Item -ItemType Directory -Force installer-dist | Out-Null
          $makensisCandidates = @(
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
            "${env:ProgramFiles}\NSIS\makensis.exe"
          )
          $makensis = $makensisCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            Write-Error "makensis.exe was not found after installing NSIS."
            exit 1
          }
          Push-Location installer
          & $makensis "/DAPP_VERSION=$env:AUTOSNAP_VERSION" AutoSnap.nsi
          $installerExit = $LASTEXITCODE
          Pop-Location
          if ($installerExit -ne 0) {
            exit $installerExit
          }
          Get-ChildItem installer-dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSnap-Windows-Installer
          path: installer-dist/AutoSnap-Setup.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-dist/AutoSnap-Setup.exe
          generate_release_notes: true
