name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.1.0+${{ github.run_number }}"
          }
          "AUTOSNAP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Building AutoSnap version: $version"

      - name: Set up conda env app
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: environment.yml
          activate-environment: app

      - name: Resolve env Python
        id: pyenv
        shell: pwsh
        run: |
          $py = Join-Path $env:CONDA "envs\app\python.exe"
          if (-not (Test-Path $py)) {
            Write-Host "::error::Could not find env python at $py"
            Write-Host "=== CONDA = $env:CONDA ==="
            if ($env:CONDA -and (Test-Path "$env:CONDA\envs")) {
              Get-ChildItem "$env:CONDA\envs" | Format-Table -AutoSize | Out-String | Write-Host
            }
            exit 1
          }
          Write-Host "Env python: $py"
          & $py -c "import sys; print('exe:', sys.executable); print('ver:', sys.version)"
          if ($LASTEXITCODE -ne 0) { throw "python --version failed" }
          & $py -m PyInstaller --version
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller missing in env" }
          "python=$py" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Test
        shell: pwsh
        run: |
          & "${{ steps.pyenv.outputs.python }}" -m unittest discover -s tests
          if ($LASTEXITCODE -ne 0) { throw "tests failed" }

      - name: Build app payload (onedir)
        shell: pwsh
        run: |
          $py = "${{ steps.pyenv.outputs.python }}"
          & $py scripts\create_icon.py
          if ($LASTEXITCODE -ne 0) { throw "create_icon failed" }
          if (-not (Test-Path "assets\autosnap.ico")) { throw "Icon not at assets\autosnap.ico" }
          Remove-Item -Recurse -Force build,dist,AutoSnap.spec,AutoSnap-Setup.spec -ErrorAction SilentlyContinue
          Write-Host "=== invoking PyInstaller stage 1 ==="
          & $py -m PyInstaller `
            --noconfirm --clean --windowed --onedir `
            --name AutoSnap `
            --icon assets\autosnap.ico `
            --add-data "assets\autosnap.ico;assets" `
            --collect-submodules pystray `
            --hidden-import pystray._win32 `
            --collect-all sv_ttk `
            --log-level INFO `
            autosnap_launcher.py
          $rc = $LASTEXITCODE
          Write-Host "PyInstaller stage 1 exited with code $rc"
          if ($rc -ne 0) { throw "PyInstaller stage 1 failed (exit $rc)" }
          Write-Host "=== workspace top-level after stage 1 ==="
          Get-ChildItem | Format-Table -AutoSize | Out-String | Write-Host

      - name: Locate app payload
        id: payload
        shell: pwsh
        run: |
          Write-Host "=== full dist tree (top 200 entries) ==="
          if (Test-Path dist) {
            Get-ChildItem -Recurse dist -ErrorAction SilentlyContinue |
              Select-Object -First 200 FullName, Length |
              Format-Table -AutoSize | Out-String | Write-Host
          } else {
            Write-Host "::warning::dist/ does not exist; searching whole workspace for AutoSnap.exe..."
            Get-ChildItem -Path . -Filter "AutoSnap.exe" -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
            Write-Host "=== build/ tree (if any) ==="
            if (Test-Path build) {
              Get-ChildItem -Recurse build -ErrorAction SilentlyContinue |
                Select-Object -First 100 FullName, Length |
                Format-Table -AutoSize | Out-String | Write-Host
            }
            throw "PyInstaller stage 1 did not create dist/"
          }
          $exe = Get-ChildItem -Path dist -Filter AutoSnap.exe -Recurse -ErrorAction SilentlyContinue |
                 Where-Object { $_.Length -gt 100KB } |
                 Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) {
            Write-Host "::error::No usable AutoSnap.exe (>100KB) under dist/"
            Get-ChildItem -Path dist -Filter "AutoSnap*.exe" -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }
          $payloadRoot = $exe.Directory.FullName
          $totalMB = [math]::Round(((Get-ChildItem -Recurse $payloadRoot -ErrorAction SilentlyContinue |
                       Measure-Object Length -Sum).Sum / 1MB), 1)
          Write-Host "App payload OK: $($exe.FullName) (bundle total $totalMB MB)"
          Write-Host "Payload root for stage 2: $payloadRoot"
          "payload_root=$payloadRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build bootstrap installer (onefile)
        shell: pwsh
        run: |
          $py = "${{ steps.pyenv.outputs.python }}"
          $payload = "${{ steps.payload.outputs.payload_root }}"
          Write-Host "Using payload root: $payload"
          Remove-Item -Recurse -Force installer-dist,build\installer,AutoSnap-Setup.spec -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path installer-dist | Out-Null
          $addData = "$payload;payload\AutoSnap"
          & $py -m PyInstaller `
            --noconfirm --clean --windowed --onefile `
            --distpath installer-dist `
            --workpath build\installer `
            --name AutoSnap-Setup `
            --icon assets\autosnap.ico `
            --add-data $addData `
            --log-level INFO `
            installer\bootstrap.py
          $rc = $LASTEXITCODE
          Write-Host "PyInstaller stage 2 exited with code $rc"
          if ($rc -ne 0) { throw "PyInstaller stage 2 failed (exit $rc)" }

      - name: Locate and stage installer
        id: locate
        shell: pwsh
        run: |
          Write-Host "=== installer-dist tree ==="
          if (Test-Path installer-dist) {
            Get-ChildItem -Recurse installer-dist | Select-Object FullName, Length |
              Format-Table -AutoSize | Out-String | Write-Host
          } else {
            Write-Host "installer-dist does not exist"
          }
          $expected = Join-Path (Get-Location) "installer-dist\AutoSnap-Setup.exe"
          if (-not (Test-Path $expected)) {
            Write-Host "::warning::Expected installer not at $expected; searching workspace..."
            $candidates = Get-ChildItem -Path . -Filter AutoSnap-Setup.exe -Recurse -ErrorAction SilentlyContinue
            $candidates | Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
            $found = $candidates | Where-Object { $_.Length -gt 1MB } | Select-Object -First 1
            if (-not $found) { $found = $candidates | Select-Object -First 1 }
            if (-not $found) {
              Write-Host "::error::AutoSnap-Setup.exe was not produced anywhere in the workspace"
              exit 1
            }
            New-Item -ItemType Directory -Path "installer-dist" -Force | Out-Null
            Copy-Item $found.FullName $expected -Force
            Write-Host "Copied $($found.FullName) -> $expected"
          }
          $sizeBytes = (Get-Item $expected).Length
          $sizeMB = [math]::Round($sizeBytes / 1MB, 1)
          Write-Host "Final installer: $expected ($sizeMB MB / $sizeBytes bytes)"
          if ($sizeBytes -lt 1MB) {
            Write-Host "::error::Installer is suspiciously small ($sizeBytes bytes)"
            exit 1
          }
          "path=$expected" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "size=$sizeBytes" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSnap-Setup-${{ steps.ver.outputs.version }}
          path: installer-dist/AutoSnap-Setup.exe
          if-no-files-found: error

      - name: Upload PyInstaller build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-build-log-${{ github.run_id }}
          path: |
            build/**
            installer-dist/**
            dist/**
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-dist/AutoSnap-Setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
